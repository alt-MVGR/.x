<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetSpeed | Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }

        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .glass-table-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.02);
        }

        tr:hover td { background-color: #fefce8; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <nav class="glass-header sticky top-0 z-40 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-slate-900 text-white p-2 rounded-lg">
                <i data-lucide="shield-alert" class="w-5 h-5"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-none">Command Center</h1>
                <p class="text-xs text-slate-400 font-medium">Administrator Clearance</p>
            </div>
        </div>
        <button onclick="logout()" class="text-slate-500 hover:text-slate-900 text-sm font-bold flex items-center gap-2">
            Logout <i data-lucide="log-out" class="w-4 h-4"></i>
        </button>
    </nav>

    <main class="max-w-6xl mx-auto p-6 mt-6">
        
        <!-- Stats Row -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 relative overflow-hidden group">
                <div class="absolute right-0 top-0 p-4 opacity-10 group-hover:scale-110 transition transform">
                    <i data-lucide="users" class="w-24 h-24"></i>
                </div>
                <p class="text-sm font-bold text-slate-400 uppercase tracking-wide">Active Users</p>
                <p class="text-4xl font-extrabold text-slate-800 mt-2" id="stat-total">-</p>
            </div>
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 relative overflow-hidden group">
                <div class="absolute right-0 top-0 p-4 opacity-10 group-hover:scale-110 transition transform">
                    <i data-lucide="ban" class="w-24 h-24 text-red-500"></i>
                </div>
                <p class="text-sm font-bold text-red-400 uppercase tracking-wide">Blocked Entities</p>
                <p class="text-4xl font-extrabold text-red-600 mt-2" id="stat-blocked">-</p>
            </div>

            <div class="bg-gradient-to-br from-yellow-500 to-amber-600 p-6 rounded-2xl shadow-lg shadow-yellow-500/20 text-white">
                <p class="text-sm font-bold text-yellow-100 uppercase tracking-wide">System Status</p>
                <div class="flex items-center gap-2 mt-2">
                    <span class="w-3 h-3 bg-white rounded-full animate-pulse"></span>
                    <p class="text-2xl font-bold">OPERATIONAL</p>
                </div>
            </div>
        </div>

        <!-- Quiz Data Viewer -->
        <div class="glass-table-container mb-8">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white">
                <h2 class="font-bold text-lg">Quiz Cache Data</h2>
                <div class="flex gap-2">
                    <select id="date-filter" class="p-2 border border-slate-200 rounded-lg text-sm font-medium">
                        <option value="all">All Dates</option>
                    </select>
                    <button onclick="loadQuizData()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500 transition">
                        <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 text-xs uppercase tracking-wider">
                            <th class="p-5 font-bold">Date</th>
                            <th class="p-5 font-bold">Question Preview</th>
                            <th class="p-5 font-bold">Answer</th>
                            <th class="p-5 font-bold">Confidence</th>
                            <th class="p-5 font-bold">Type</th>
                        </tr>
                    </thead>
                    <tbody id="quiz-rows" class="divide-y divide-slate-100 text-sm font-medium">
                        <tr><td colspan="5" class="p-6 text-center text-slate-400">Loading quiz data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Create User Module -->
        <div class="glass-table-container mb-8 overflow-visible">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white">
                <h2 class="font-bold text-lg flex items-center gap-2"><i data-lucide="user-plus" class="w-5 h-5 text-yellow-600"></i> Provision New User</h2>
            </div>
            <div class="p-6 bg-slate-50 flex flex-col md:flex-row gap-4 items-end">
                <div class="flex-1 w-full">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Identity (Email)</label>
                    <input type="email" id="new-user-email" class="w-full p-3 border border-slate-200 rounded-xl text-sm font-medium outline-none focus:border-yellow-500 focus:ring-2 focus:ring-yellow-500/20 transition" placeholder="agent@netspeed.com">
                </div>
                <div class="flex-1 w-full">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Passcode</label>
                    <input type="password" id="new-user-pass" class="w-full p-3 border border-slate-200 rounded-xl text-sm font-medium outline-none focus:border-yellow-500 focus:ring-2 focus:ring-yellow-500/20 transition" placeholder="••••••••">
                </div>
                <button onclick="createNewUser()" id="create-user-btn" class="w-full md:w-auto bg-slate-900 hover:bg-slate-800 text-white px-6 py-3 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2 h-[46px]">
                    <i data-lucide="plus" class="w-4 h-4"></i> Provision Account
                </button>
            </div>
            <div id="create-user-msg" class="hidden p-3 mx-6 mb-6 rounded-lg text-sm font-medium text-center"></div>
        </div>

        <!-- Table -->
        <div class="glass-table-container">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white">
                <h2 class="font-bold text-lg">User Registry</h2>
                <button onclick="loadUsers()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500 transition">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 text-xs uppercase tracking-wider">
                            <th class="p-5 font-bold">Identity</th>
                            <th class="p-5 font-bold">Role</th>
                            <th class="p-5 font-bold">Status</th>
                            <th class="p-5 font-bold text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="user-rows" class="divide-y divide-slate-100 text-sm font-medium">
                        <!-- JS Injection -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- Key Management Modal -->
    <div id="key-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300" id="key-modal-content">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <div>
                    <h2 class="font-bold text-lg text-slate-800">Manage API Keys</h2>
                    <p class="text-xs text-slate-500 font-mono mt-1" id="key-modal-uid"></p>
                </div>
                <button onclick="closeKeyModal()" class="text-slate-400 hover:text-slate-600 transition">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="p-6 bg-white">
                <div class="flex gap-2 mb-6">
                    <input type="text" id="new-key-input" placeholder="gsk_..." class="flex-1 p-3 border border-slate-200 rounded-xl text-sm font-medium outline-none focus:border-yellow-500 focus:ring-2 focus:ring-yellow-500/20 transition">
                    <button onclick="addKey()" class="bg-slate-900 hover:bg-slate-800 text-white px-4 py-2 rounded-xl text-sm font-bold transition flex items-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4"></i> Add
                    </button>
                </div>
                
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Active Keys</h3>
                <div id="keys-list" class="space-y-2 max-h-60 overflow-y-auto pr-2">
                    <!-- JS Injection -->
                </div>
            </div>
            
            <div class="p-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                <button onclick="closeKeyModal()" class="px-4 py-2 text-slate-500 hover:text-slate-700 text-sm font-bold transition">Cancel</button>
                <button onclick="saveKeys()" id="save-keys-btn" class="bg-gradient-to-r from-yellow-500 to-amber-600 hover:from-yellow-400 hover:to-amber-500 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-lg shadow-yellow-500/30 transition-all flex items-center gap-2">
                    Save Changes
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, getDocs, collection, updateDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCMdcIYi91aWXI9cHz3fFW78rJ8JHV-j9w",
            authDomain: "alt-mvgr.firebaseapp.com",
            projectId: "alt-mvgr",
            storageBucket: "alt-mvgr.firebasestorage.app",
            messagingSenderId: "163312491278",
            appId: "1:163312491278:web:26d37f4133224e7082955f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        // Secondary App for User Creation (prevents Admin logout)
        const secondaryApp = initializeApp(firebaseConfig, "SecondaryApp");
        const secondaryAuth = getAuth(secondaryApp);

        window.createNewUser = async () => {
            const emailInput = document.getElementById('new-user-email');
            const passInput = document.getElementById('new-user-pass');
            const btn = document.getElementById('create-user-btn');
            const msg = document.getElementById('create-user-msg');
            
            const email = emailInput.value.trim();
            const pass = passInput.value;
            
            if(!email || !pass) return;
            if(pass.length < 6) {
                showCreateMsg('Password must be at least 6 characters.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Provisioning...`;
            msg.classList.add('hidden');

            try {
                // Create user in Auth
                const cred = await createUserWithEmailAndPassword(secondaryAuth, email, pass);
                await signOut(secondaryAuth); // Instantly sign them out from secondary app
                
                // Create user doc in Firestore using primary DB connection
                await setDoc(doc(db, "users", cred.user.uid), {
                    email: email,
                    role: 'student',
                    isBlocked: false,
                    apiKeys: [],
                    createdAt: new Date().toISOString()
                });

                emailInput.value = '';
                passInput.value = '';
                showCreateMsg('Account successfully provisioned!', 'success');
                
                // Refresh table
                loadUsers();
            } catch (error) {
                showCreateMsg(error.message.replace('Firebase:', '').trim(), 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="plus" class="w-4 h-4"></i> Provision Account`;
                lucide.createIcons();
            }
        };

        function showCreateMsg(text, type) {
            const msg = document.getElementById('create-user-msg');
            msg.textContent = text;
            msg.className = `p-3 mx-6 mb-6 rounded-lg text-sm font-medium text-center ${type === 'error' ? 'bg-red-50 text-red-600 border border-red-100' : 'bg-emerald-50 text-emerald-600 border border-emerald-100'}`;
            msg.classList.remove('hidden');
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            const snap = await getDoc(doc(db, "users", user.uid));
            if(!snap.exists() || snap.data().role !== 'admin') {
                window.location.href = 'dashboard.html';
                return;
            }
            currentUser = user;
            loadUsers();
        });

        window.loadUsers = async () => {
            const tbody = document.getElementById('user-rows');
            tbody.innerHTML = '<tr><td colspan="4" class="p-6 text-center text-slate-400">Syncing database...</td></tr>';
            
            try {
                const query = await getDocs(collection(db, "users"));
                let html = '';
                let total = 0, blocked = 0;

                query.forEach(docSnap => {
                    const u = docSnap.data();
                    const uid = docSnap.id;
                    total++;
                    if(u.isBlocked) blocked++;

                    const isSelf = uid === currentUser.uid;
                    const statusBadge = u.isBlocked 
                        ? `<span class="inline-flex items-center gap-1 text-red-600 bg-red-50 px-2 py-1 rounded-full text-xs font-bold"><i data-lucide="ban" class="w-3 h-3"></i> BLOCKED</span>`
                        : `<span class="inline-flex items-center gap-1 text-emerald-600 bg-emerald-50 px-2 py-1 rounded-full text-xs font-bold"><i data-lucide="check-circle" class="w-3 h-3"></i> ACTIVE</span>`;
                    
                    const roleBadge = u.role === 'admin' 
                        ? `<span class="text-purple-600 bg-purple-50 px-2 py-1 rounded-md text-xs font-bold border border-purple-100">ADMIN</span>`
                        : `<span class="text-slate-500 bg-slate-100 px-2 py-1 rounded-md text-xs font-bold">USER</span>`;

                    let keysArray = [];
                    if (u.apiKeys && Array.isArray(u.apiKeys)) keysArray = u.apiKeys;
                    else if (u.apiKey) keysArray = [u.apiKey];
                    const keysStr = keysArray.join(',');
                    
                    let actionBtn = '';
                    if (!isSelf) {
                        let blockBtn = '';
                        if (u.isBlocked) {
                            blockBtn = `<button onclick="setBlock('${uid}', false)" class="text-emerald-600 hover:bg-emerald-50 px-3 py-1.5 rounded-lg text-xs font-bold transition border border-emerald-200">Unblock Access</button>`;
                        } else {
                            blockBtn = `<button onclick="setBlock('${uid}', true)" class="text-red-600 hover:bg-red-50 px-3 py-1.5 rounded-lg text-xs font-bold transition border border-red-200">Block Access</button>`;
                        }
                        
                        let keyBtn = `<button onclick="openKeyModal('${uid}', '${keysStr}')" class="text-yellow-600 hover:bg-yellow-50 px-3 py-1.5 rounded-lg text-xs font-bold transition border border-yellow-200 mr-2 gap-1 inline-flex items-center"><i data-lucide="key" class="w-3 h-3"></i> Keys (${keysArray.length})</button>`;
                        
                        let delBtn = `<button onclick="deleteUserDoc('${uid}')" class="text-red-600 hover:bg-red-50 px-2 py-1.5 rounded-lg text-xs font-bold transition border border-red-200 ml-2" title="Delete User"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`;
                        
                        actionBtn = keyBtn + blockBtn + delBtn;
                    } else {
                        actionBtn = `<span class="text-xs text-slate-300 italic pr-2">System Protected</span>`;
                    }

                    const safeEmail = u.email || 'unknown@user.com';
                    
                    html += `
                        <tr class="transition">
                            <td class="p-5">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center font-bold text-slate-500 text-xs">
                                        ${safeEmail.charAt(0).toUpperCase()}
                                    </div>
                                    <div>
                                        <p class="text-slate-900 font-bold">${safeEmail}</p>
                                        <p class="text-slate-400 text-xs font-mono">${uid.substring(0,8)}...</p>
                                    </div>
                                </div>
                            </td>
                            <td class="p-5">${roleBadge}</td>
                            <td class="p-5">${statusBadge}</td>
                            <td class="p-5 text-right">${actionBtn}</td>
                        </tr>
                    `;
                });

                tbody.innerHTML = html;
                document.getElementById('stat-total').innerText = total;
                document.getElementById('stat-blocked').innerText = blocked;
                lucide.createIcons();

            } catch (e) {
                console.error(e);
            }
        }

        window.setBlock = async (uid, state) => {
            await updateDoc(doc(db, "users", uid), { isBlocked: state });
            loadUsers();
        }

        window.deleteUserDoc = async (uid) => {
            if(confirm("Are you sure you want to permanently delete this user? They will lose all access immediately.")) {
                try {
                    await deleteDoc(doc(db, "users", uid));
                    loadUsers();
                } catch(e) {
                    alert("Error deleting user: " + e.message);
                }
            }
        }

        window.currentManagingUid = null;
        window.currentManagingKeys = [];

        window.openKeyModal = (uid, keysStr) => {
            window.currentManagingUid = uid;
            window.currentManagingKeys = keysStr ? keysStr.split(',') : [];
            document.getElementById('key-modal-uid').innerText = uid;
            renderKeysList();
            
            const modal = document.getElementById('key-modal');
            const content = document.getElementById('key-modal-content');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            content.classList.remove('scale-95');
        };

        window.closeKeyModal = () => {
            const modal = document.getElementById('key-modal');
            const content = document.getElementById('key-modal-content');
            modal.classList.add('opacity-0', 'pointer-events-none');
            content.classList.add('scale-95');
            document.getElementById('new-key-input').value = '';
        };

        window.addKey = () => {
            const input = document.getElementById('new-key-input');
            const key = input.value.trim();
            if (!key) return;
            if (!key.startsWith('gsk_')) {
                alert("Groq API keys must start with 'gsk_'");
                return;
            }
            if (window.currentManagingKeys.includes(key)) {
                alert("Key already exists in the list.");
                return;
            }
            window.currentManagingKeys.push(key);
            input.value = '';
            renderKeysList();
        };

        window.removeKey = (index) => {
            window.currentManagingKeys.splice(index, 1);
            renderKeysList();
        };

        window.renderKeysList = () => {
            const list = document.getElementById('keys-list');
            if (window.currentManagingKeys.length === 0) {
                list.innerHTML = '<p class="text-sm text-slate-400 text-center py-4 italic">No keys assigned.</p>';
                lucide.createIcons();
                return;
            }
            
            let html = '';
            window.currentManagingKeys.forEach((k, i) => {
                const masked = k.length > 8 ? k.substring(0,4) + '••••' + k.substring(k.length-4) : k;
                html += `
                    <div class="flex items-center justify-between p-3 bg-white border border-slate-200 rounded-xl group hover:border-yellow-300 transition">
                        <span class="text-sm font-mono text-slate-600">${masked}</span>
                        <button onclick="removeKey(${i})" class="text-slate-300 hover:text-red-500 transition opacity-0 group-hover:opacity-100">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
            });
            list.innerHTML = html;
            lucide.createIcons();
        };

        window.saveKeys = async () => {
            if (!window.currentManagingUid) return;
            const btn = document.getElementById('save-keys-btn');
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Saving...';
            btn.disabled = true;
            lucide.createIcons();
            
            try {
                await updateDoc(doc(db, "users", window.currentManagingUid), { 
                    apiKeys: window.currentManagingKeys 
                });
                closeKeyModal();
                loadUsers(); // Refresh the table
            } catch(e) {
                console.error(e);
                alert("Failed to save keys.");
            }
            
            btn.innerHTML = 'Save Changes';
            btn.disabled = false;
        };

        window.loadQuizData = async () => {
            const tbody = document.getElementById('quiz-rows');
            tbody.innerHTML = '<tr><td colspan="5" class="p-6 text-center text-slate-400">Syncing quiz cache...</td></tr>';
            
            try {
                const dateFilter = document.getElementById('date-filter').value;
                let quizQuery = collection(db, "quiz_cache");
                
                if (dateFilter !== 'all') {
                    quizQuery = query(quizQuery, where("date", "==", dateFilter));
                }
                
                const snapshot = await getDocs(quizQuery);
                
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="5" class="p-6 text-center text-slate-400">No quiz data found</td></tr>';
                    return;
                }

                let html = '';
                const dates = new Set();

                snapshot.forEach(docSnap => {
                    const q = docSnap.data();
                    dates.add(q.date);
                    
                    const questionPreview = q.questionText 
                        ? q.questionText.substring(0, 80) + (q.questionText.length > 80 ? '...' : '')
                        : '[Image-based question]';
                    
                    const hasImage = q.imageHash ? '📷' : '📝';
                    const confidence = q.confidence || 100;
                    const confColor = confidence >= 80 ? 'text-green-600' : confidence >= 60 ? 'text-yellow-600' : 'text-red-600';
                    
                    html += `
                        <tr class="transition hover:bg-slate-50">
                            <td class="p-5">
                                <span class="text-slate-700 font-bold">${q.date || 'N/A'}</span>
                            </td>
                            <td class="p-5">
                                <div class="text-slate-600" style="max-width: 400px;">
                                    ${questionPreview}
                                </div>
                            </td>
                            <td class="p-5">
                                <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-black text-white font-bold text-sm">
                                    ${q.correct}
                                </span>
                            </td>
                            <td class="p-5">
                                <span class="${confColor} font-bold">${confidence}%</span>
                            </td>
                            <td class="p-5">
                                <span class="text-2xl">${hasImage}</span>
                            </td>
                        </tr>
                    `;
                });

                tbody.innerHTML = html;

                // Update date filter options
                const dateFilterSelect = document.getElementById('date-filter');
                const currentValue = dateFilterSelect.value;
                dateFilterSelect.innerHTML = '<option value="all">All Dates</option>';
                
                Array.from(dates).sort().reverse().forEach(date => {
                    const option = document.createElement('option');
                    option.value = date;
                    option.textContent = date;
                    if (date === currentValue) option.selected = true;
                    dateFilterSelect.appendChild(option);
                });

                lucide.createIcons();

            } catch (e) {
                console.error("Quiz data error:", e);
                tbody.innerHTML = '<tr><td colspan="5" class="p-6 text-center text-red-500">Error loading quiz data</td></tr>';
            }
        }

        // Load quiz data on page load
        window.addEventListener('load', () => {
            setTimeout(loadQuizData, 500);
        });

        window.logout = () => signOut(auth);
        lucide.createIcons();
    </script>
</body>
</html>
